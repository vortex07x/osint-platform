services:
  postgres:
    image: postgres:15
    container_name: osint_postgres
    environment:
      POSTGRES_DB: osint_db
      POSTGRES_USER: osint_user
      POSTGRES_PASSWORD: osint_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: osint_redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: osint_neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_pass_2024
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data: