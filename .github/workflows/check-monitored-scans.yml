name: Check Monitored Scans

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitored scan check
        run: |
          curl -X POST https://osint-backend-j57f.onrender.com/scans/internal/check-monitored-scans \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail \
            --show-error \
            --silent